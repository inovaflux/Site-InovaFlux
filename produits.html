<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue InovaFlux | Options et Kits</title>
    <style>
        /* --- VARIABLES --- */
        :root {
            --bleu: #1A365D;
            --orange: #E67E22;
            --fond: #F4F7F6;
            --gris-clair: #e2e8f0;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--fond); color: #333; line-height: 1.5; }
        
        /* --- BARRE DE NAVIGATION (PARAMÈTRES DU PANIER) --- */
        header {
            background: white;
            padding: 16px 5%;
            border-bottom: 2px solid var(--bleu);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            gap: 20px;
            flex-wrap: wrap;
        }

        .logo { height: 120px; width: auto; display: block; max-width: 100%; }

        .nav-top { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }

        .lang-switch {
            margin-left: 10px;
            font-size: 0.9rem;
        }

        .lang-switch a {
            color: var(--bleu);
            text-decoration: none;
        }

        .lang-switch a:hover {
            text-decoration: underline;
        }

        .btn-nav {
            display: inline-block;
            text-decoration: none;
            font-weight: bold;
            padding: 12px 22px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-bleu {
            color: var(--bleu);
            border: 2px solid var(--bleu);
        }

        .btn-bleu:hover,
        .btn-nav.current.btn-bleu {
            background: var(--bleu);
            color: white;
        }

        .btn-orange {
            background: var(--orange);
            color: white;
            border: 2px solid var(--orange);
        }

        .btn-orange:hover,
        .btn-nav.current.btn-orange {
            background: #d35400;
            border-color: #d35400;
        }

        /* --- STRUCTURE DE LA PAGE --- */
        .container { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
        .intro-text { text-align: center; margin-bottom: 40px; color: #555; }

        .produit-card {
            background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 50px; overflow: hidden; display: flex; flex-direction: column;
        }

        .produit-header { display: flex; gap: 30px; padding: 30px; background: white; flex-wrap: wrap; }

        .produit-image { 
            flex: 1; min-width: 250px; background: #eee; border-radius: 8px; 
            border: 1px solid #ddd;
        }
        
        .produit-image img { 
            width: 100%; 
            height: auto; 
            object-fit: contain; 
            display: block;
        }

        /* --- CARROUSEL D'IMAGES (version simplifiée, compatible mobile) --- */
        .carousel {
            position: relative;
            overflow: hidden;
        }

        .carousel-inner {
            position: relative;
            width: 100%;
        }

        .carousel-item {
            display: none;
        }

        .carousel-item.active {
            display: block;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.4);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .carousel-btn.prev { left: 8px; }
        .carousel-btn.next { right: 8px; }

        .produit-intro { flex: 2; min-width: 300px; }
        .ref { font-family: monospace; color: #718096; font-weight: bold; }
        h2 { color: var(--bleu); margin-top: 5px; }

        /* --- TABLEAU DES PRIX --- */
        .options-table { width: 100%; border-collapse: collapse; background: #fff; }
        .options-table th { background: var(--bleu); color: white; padding: 12px; text-align: left; }
        .options-table td { padding: 15px; border-top: 1px solid var(--gris-clair); vertical-align: middle; }

        .price-tag { font-weight: bold; color: var(--bleu); font-size: 1.1rem; }

        .btn-Commande {
            display: inline-block; padding: 8px 16px; border-radius: 4px;
            text-decoration: none; font-weight: bold; font-size: 0.9rem;
            transition: 0.2s; text-align: center; background: var(--orange); color: white;
        }
        .btn-Commande:hover { background: #d35400; }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            header {
                padding: 10px 3%;
            }

            .logo {
                height: 80px;
            }

            .produit-header {
                flex-direction: column;
            }
        }

        /* --- MOBILE PAYSAGE : réduire la hauteur du header, logo petit --- */
        @media (max-height: 500px) and (orientation: landscape) {
            header {
                padding: 5px 3%;
            }

            .logo {
                height: 40px;
            }

            .nav-top {
                gap: 8px;
            }

            .btn-nav {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
        }

        /* --- BOUTON VUE 3D --- */
        .btn-3d {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            padding: 8px 18px;
            background: var(--bleu);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-3d:hover { background: #0f2440; }

        /* --- MODAL VISIONNEUR 3D --- */
        .modal-3d {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .modal-3d.open { display: flex; }

        .modal-3d-inner {
            background: #1a1a2e;
            border-radius: 12px;
            width: 90vw;
            max-width: 900px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        .modal-3d-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: var(--bleu);
            color: white;
            font-weight: bold;
        }

        .modal-3d-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            line-height: 1;
        }

        #viewer-container {
            flex: 1;
            width: 100%;
        }

        #viewer-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .viewer-msg {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #aaa;
            font-size: 1rem;
            text-align: center;
            padding: 30px;
            line-height: 1.8;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px 4%;
            }

            /* Resserre le tableau et le texte sur mobile
               pour éviter que les cellules et le bouton "Commande"
               ne débordent horizontalement. */
            .options-table {
                width: 100%;
                table-layout: fixed;
                font-size: 0.85rem;
            }

            .options-table th,
            .options-table td {
                padding: 8px 6px;
                word-wrap: break-word;
            }

            .btn-Commande {
                display: inline-block;
                padding: 6px 8px;
                font-size: 0.75rem;
                /* Laisse le texte revenir à la ligne si nécessaire */
                white-space: normal;
                /* Laisse un peu d'espace entre le bouton et le bord de la cellule */
                max-width: 90%;
            }
        }
    </style>
    <!-- Viewer 3D hébergé localement (supporte .step, .stl, .obj…) -->
    <script src="libs/occt-import-js.js"></script>
    <script src="libs/o3dv.min.js"></script>
</head>
<body>

<!-- Modal visionneur 3D -->
<div class="modal-3d" id="modal3d">
    <div class="modal-3d-inner">
        <div class="modal-3d-header">
            <span id="modal3d-title">Vue 3D</span>
            <button class="modal-3d-close" id="modal3d-close" title="Fermer">✕</button>
        </div>
        <div id="viewer-container"></div>
    </div>
</div>

<header>
    <a href="index.html">
        <img src="logo.png" alt="InovaFlux" class="logo">
    </a>

    <nav class="nav-top">
        <a href="index.html" class="btn-nav btn-bleu">← Accueil</a>
        <a href="produits.html" class="btn-nav btn-bleu current">Produits</a>
        <a href="telechargements.html" class="btn-nav btn-bleu">Téléchargements</a>
        <a href="contact.html" class="btn-nav btn-orange">Contact</a>
        <a href="panier.html" class="btn-nav btn-bleu">Panier</a>
        <span class="lang-switch">FR | <a href="en/produits.html">EN</a></span>
    </nav>
</header>

<div class="container">
    <div class="intro-text">
        <h1>Solutions d'Automatisation</h1>
        <p>Sélectionnez votre produit et la version souhaitée. Pour les commandes scolaires, utilisez le bouton <strong>Contact</strong> en haut de page.</p>
    </div>

    <div id="produits-container"></div>
</div>

<script>
    // Génère dynamiquement les produits à partir de produits.json
    fetch('produits.json?v=' + Date.now())
        .then(function (res) { return res.json(); })
        .then(function (data) {
            var container = document.getElementById('produits-container');
            if (!container || !data || !Array.isArray(data.products)) return;

            data.products.forEach(function (p) {
                var images = Array.isArray(p.images) && p.images.length ? p.images : (p.image ? [p.image] : []);

                var card = document.createElement('div');
                card.className = 'produit-card';

                card.innerHTML =
                    '<div class="produit-header">' +
                        '<div class="produit-image carousel" data-product-id="' + p.id + '">' +
                            '<div class="carousel-inner">' +
                                images.map(function (src, index) {
                                    var activeClass = index === 0 ? ' active' : '';
                                    var displayStyle = index === 0 ? 'block' : 'none';
                                    return '<img class="carousel-item' + activeClass + '" style="display:' + displayStyle + ';" src="' + src + '" alt="' + (p.imageAlt && p.imageAlt.fr ? p.imageAlt.fr : '') + '">';
                                }).join('') +
                            '</div>' +
                            (images.length > 1
                                ? '<button class="carousel-btn prev" data-dir="prev">&#10094;</button>' +
                                  '<button class="carousel-btn next" data-dir="next">&#10095;</button>'
                                : '') +
                        '</div>' +
                        '<div class="produit-intro">' +
                            '<span class="ref">REF: ' + p.ref + '</span>' +
                            '<h2>' + (p.name && p.name.fr ? p.name.fr : '') + '</h2>' +
                            '<p>' + (p.description && p.description.fr ? p.description.fr : '') + '</p>' +
                            (p.step
                                ? '<button class="btn-3d" data-step="' + p.step + '" data-name="' + (p.name && p.name.fr ? p.name.fr : '') + '">&#9654; Vue 3D</button>'
                                : '') +
                        '</div>' +
                    '</div>' +
                    '<table class="options-table">' +
                        '<thead>' +
                            '<tr><th>Version</th><th>Inclus</th><th>Prix</th><th>Achat sécurisé</th></tr>' +
                        '</thead>' +
                        '<tbody>' +
                            (p.options || []).map(function (opt, idx) {
                                var optLabel = (opt.label && opt.label.fr ? opt.label.fr : '');
                                var optPrice = (opt.price || '');
                                return '<tr>' +
                                    '<td><strong>' + optLabel + '</strong></td>' +
                                    '<td>' + (opt.includes && opt.includes.fr ? opt.includes.fr : '') + '</td>' +
                                    '<td class="price-tag">' + optPrice + '</td>' +
                                    '<td>' +
                                        '<input type="number" min="1" value="1" class="qty-commande" style="width:55px;margin-right:8px;" ' +
                                            'data-ref="' + (p.ref || '') + '" ' +
                                            'data-name="' + (p.name && p.name.fr ? p.name.fr : '') + '" ' +
                                            'data-option="' + optLabel + '" ' +
                                            'data-price="' + optPrice + '"' +
                                        '>' +
                                        '<a href="#" class="btn-Commande" ' +
                                            'data-ref="' + (p.ref || '') + '" ' +
                                            'data-name="' + (p.name && p.name.fr ? p.name.fr : '') + '" ' +
                                            'data-option="' + optLabel + '" ' +
                                            'data-price="' + optPrice + '"' +
                                        '>Commande</a>' +
                                    '</td>' +
                                '</tr>';
                            }).join('') +
                        '</tbody>' +
                    '</table>';

                container.appendChild(card);
            });

            initCarousels();
            initCartButtons();
            init3DButtons();
        })
        .catch(function (err) {
            console.error('Erreur chargement produits.json', err);
        });

    function initCarousels() {
        var carousels = document.querySelectorAll('.carousel');

        carousels.forEach(function (carousel) {
            var items = carousel.querySelectorAll('.carousel-item');
            if (!items.length) return;

            var index = 0;

            function show(i) {
                index = (i + items.length) % items.length;
                items.forEach(function (img, k) {
                    var isActive = (k === index);
                    img.classList.toggle('active', isActive);
                    img.style.display = isActive ? 'block' : 'none';
                });
            }

            var prevBtn = carousel.querySelector('.carousel-btn.prev');
            var nextBtn = carousel.querySelector('.carousel-btn.next');

            if (prevBtn) {
                prevBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    show(index - 1);
                    resetAutoPlay();
                });
            }

            if (nextBtn) {
                nextBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    show(index + 1);
                    resetAutoPlay();
                });
            }

            // Auto-play toutes les 4 secondes (seulement si plusieurs images)
            var autoTimer;
            function resetAutoPlay() {
                clearInterval(autoTimer);
                if (items.length > 1) {
                    autoTimer = setInterval(function () { show(index + 1); }, 4000);
                }
            }
            resetAutoPlay();

            // Touch support
            var startX = null;
            carousel.addEventListener('touchstart', function (e) {
                if (e.touches && e.touches.length === 1) {
                    startX = e.touches[0].clientX;
                }
            });

            carousel.addEventListener('touchend', function (e) {
                if (startX === null) return;
                var endX = e.changedTouches[0].clientX;
                var deltaX = endX - startX;
                var threshold = 30;
                if (deltaX > threshold) {
                    show(index - 1);
                } else if (deltaX < -threshold) {
                    show(index + 1);
                }
                startX = null;
            });
        });
    }

    // ── Visionneur 3D local (occt-import-js + online-3d-viewer) ───────────────
    var ovViewer = null;

    function init3DButtons() {
        document.querySelectorAll('.btn-3d').forEach(function (btn) {
            btn.addEventListener('click', function () {
                open3DModal(btn.getAttribute('data-step'), btn.getAttribute('data-name') || 'Modèle 3D');
            });
        });
    }

    function open3DModal(stepPath, title) {
        var modal     = document.getElementById('modal3d');
        var container = document.getElementById('viewer-container');

        document.getElementById('modal3d-title').textContent = title + ' — Vue 3D';
        modal.classList.add('open');
        container.innerHTML = '<div class="viewer-msg">Chargement du modèle 3D…</div>';

        // Résoudre l'URL du fichier STEP
        var fileUrl = stepPath.match(/^https?:\/\//)
            ? stepPath
            : window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/') + stepPath;

        // Créer le conteneur du viewer
        var viewerDiv = document.createElement('div');
        viewerDiv.style.cssText = 'width:100%;height:100%;';
        container.innerHTML = '';
        container.appendChild(viewerDiv);

        // Détruire le viewer précédent si existant
        if (ovViewer) { try { ovViewer.Destroy(); } catch(e) {} ovViewer = null; }

        try {
            ovViewer = new OV.EmbeddedViewer(viewerDiv);
            ovViewer.LoadModelFromUrlList([fileUrl]);
        } catch (e) {
            container.innerHTML = '<div class="viewer-msg">Erreur de chargement du modèle 3D.<br><small style="color:#666;">' + e.message + '</small></div>';
        }
    }

    function close3DModal() {
        document.getElementById('modal3d').classList.remove('open');
        document.getElementById('viewer-container').innerHTML = '';
        if (ovViewer) { try { ovViewer.Destroy(); } catch(e) {} ovViewer = null; }
    }

    document.getElementById('modal3d-close').addEventListener('click', close3DModal);
    document.getElementById('modal3d').addEventListener('click', function (e) {
        if (e.target === this) close3DModal();
    });

    // ── Gestion du panier simple côté client (localStorage)
    function initCartButtons() {
        var buttons = document.querySelectorAll('.btn-Commande[data-ref]');
        buttons.forEach(function (btn) {
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                // Cherche un champ quantité associé sur la même cellule
                var parentCell = btn.closest('td');
                var qtyInput = parentCell ? parentCell.querySelector('.qty-commande') : null;
                var qtyVal = qtyInput ? parseInt(qtyInput.value, 10) : 1;
                if (isNaN(qtyVal) || qtyVal < 1) qtyVal = 1;

                var item = {
                    ref: btn.getAttribute('data-ref') || '',
                    name: btn.getAttribute('data-name') || '',
                    option: btn.getAttribute('data-option') || '',
                    price: btn.getAttribute('data-price') || '',
                    qty: qtyVal
                };

                try {
                    var stored = localStorage.getItem('panierInovaFlux');
                    var cart = stored ? JSON.parse(stored) : [];

                    // Fusionne avec un item identique (même ref + option + prix)
                    var merged = false;
                    for (var i = 0; i < cart.length; i++) {
                        var it = cart[i];
                        if (it.ref === item.ref &&
                            it.option === item.option &&
                            it.price === item.price) {
                            it.qty = (it.qty || 1) + item.qty;
                            merged = true;
                            break;
                        }
                    }
                    if (!merged) {
                        cart.push(item);
                    }

                    localStorage.setItem('panierInovaFlux', JSON.stringify(cart));
                    alert('Ajouté au panier : ' + item.qty + ' x ' + item.name + ' - ' + item.option);
                } catch (err) {
                    console.error('Erreur panier', err);
                    alert('Impossible d\'ajouter au panier sur ce navigateur.');
                }
            });
        });
    }
</script>

</body>
</html>
